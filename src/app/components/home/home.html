<div class="home-container">
  <div class="welcome-text">
    <h1>Welcome to My Portfolio</h1>
    <div class="hero-actions">
      <button class="explore-btn" (click)="scrollToAbout()">About Me</button>
      <button class="contact-btn" (click)="scrollToContact()">Contact Me</button>
    </div>
    
  </div>
  
</div>

<section class="about-section" aria-label="About me" id="about">
  <h2 class="about-section-title">About Me</h2>
  <div class="about-inner">
    <a class="about-copy about-link" routerLink="/skills" aria-label="Go to Skills">
      <h3 class="about-title">Tech</h3>
      <p class="about-bio">{{ aboutMe.techSummary }}</p>
      <p class="about-bio about-bio--tight">{{ aboutMe.techExtra }}</p>

      <div class="about-chips" aria-label="Core skills">
        <span class="about-chip" *ngFor="let chip of aboutMe.techChips">{{ chip }}</span>
      </div>
    </a>

    <aside class="about-aside" aria-label="Highlights">
      <a class="about-card about-card--flat about-link" routerLink="/experience" aria-label="Go to Experience">
        <p class="about-card-kicker">Experience</p>
        <p class="about-card-text">{{ aboutMe.experienceSummary }}</p>
        <p class="about-card-text about-card-text--tight">{{ aboutMe.experienceExtra }}</p>
        <p class="about-card-text about-card-text--tight">{{ aboutMe.experienceExtra2 }}</p>
        <div class="about-chips about-chips--tight" aria-label="Experience highlights">
          <span class="about-chip" *ngFor="let chip of aboutMe.experienceChips">{{ chip }}</span>
        </div>
      </a>
    </aside>
  </div>

  <div class="about-actions">
    <button class="explore-btn" (click)="explorePortfolio()">Explore</button>
  </div>
</section>
